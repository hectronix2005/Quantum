<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Quantum Florida Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login" id="loginScreen">
        <div class="login__card">
            <div class="login__logo">
                <span class="logo__q">Q</span>
                <div>
                    <span class="logo__quantum">QUANTUM</span>
                    <span class="logo__florida">FLORIDA MANAGEMENT</span>
                </div>
            </div>
            <h1>Welcome</h1>
            <p class="login__subtitle">Sign in to access your portal</p>
            <form id="loginForm" class="login__form">
                <div class="form__group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form__input" placeholder="your@email.com" required>
                </div>
                <div class="form__group">
                    <label for="loginPass">Password</label>
                    <div class="input__password">
                        <input type="password" id="loginPass" class="form__input" placeholder="Enter password" required>
                        <button type="button" class="btn__eye" id="togglePassBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>
                <p class="login__error" id="loginError"></p>
                <button type="submit" class="btn btn--primary btn--full">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Sign In
                </button>
            </form>
            <div class="login__demos">
                <p class="login__demos-title">Demo accounts:</p>
                <div class="login__demo" data-email="admin@quantumfloridamgmt.com" data-pass="quantum2026">
                    <span class="demo__badge demo__badge--admin">Admin</span>
                    <span class="demo__email">admin@quantumfloridamgmt.com</span>
                </div>
                <div class="login__demo" data-email="maria@example.com" data-pass="client123">
                    <span class="demo__badge demo__badge--client">Client</span>
                    <span class="demo__email">maria@example.com</span>
                </div>
                <div class="login__demo" data-email="james@example.com" data-pass="client123">
                    <span class="demo__badge demo__badge--client">Client</span>
                    <span class="demo__email">james@example.com</span>
                </div>
            </div>
            <a href="../index.html" class="login__back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to website
            </a>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
