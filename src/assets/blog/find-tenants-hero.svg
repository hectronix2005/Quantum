<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0e1e35"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Background glow -->
  <circle cx="620" cy="200" r="180" fill="rgba(37,99,235,0.07)"/>

  <!-- House outline (right side) -->
  <!-- Roof -->
  <polygon points="570,80 460,160 680,160" fill="rgba(37,99,235,0.3)" stroke="rgba(37,99,235,0.6)" stroke-width="2"/>
  <!-- House body -->
  <rect x="475" y="158" width="190" height="150" rx="3" fill="rgba(37,99,235,0.15)" stroke="rgba(37,99,235,0.4)" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="540" y="235" width="60" height="73" rx="3" fill="rgba(37,99,235,0.5)"/>
  <circle cx="590" cy="272" r="4" fill="#d4a843"/>
  <!-- Windows -->
  <rect x="492" y="180" width="40" height="35" rx="3" fill="rgba(212,168,67,0.25)" stroke="rgba(212,168,67,0.4)" stroke-width="1"/>
  <line x1="512" y1="180" x2="512" y2="215" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  <rect x="608" y="180" width="40" height="35" rx="3" fill="rgba(212,168,67,0.25)" stroke="rgba(212,168,67,0.4)" stroke-width="1"/>
  <line x1="628" y1="180" x2="628" y2="215" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  <!-- Ground -->
  <line x1="440" y1="308" x2="710" y2="308" stroke="rgba(37,99,235,0.3)" stroke-width="2"/>

  <!-- Magnifying glass -->
  <circle cx="660" cy="130" r="45" fill="none" stroke="#d4a843" stroke-width="3"/>
  <circle cx="660" cy="130" r="35" fill="rgba(212,168,67,0.06)"/>
  <line x1="694" y1="162" x2="720" y2="190" stroke="#d4a843" stroke-width="5" stroke-linecap="round"/>
  <!-- Check mark inside magnifying glass -->
  <polyline points="645,128 657,140 678,116" fill="none" stroke="rgba(16,185,129,0.9)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- People icons (floating) -->
  <!-- Person 1 -->
  <circle cx="458" cy="268" r="12" fill="rgba(37,99,235,0.5)" stroke="rgba(37,99,235,0.8)" stroke-width="1.5"/>
  <path d="M440,308 Q458,285 476,308" fill="rgba(37,99,235,0.3)" stroke="rgba(37,99,235,0.6)" stroke-width="1.5"/>
  <!-- Person 2 -->
  <circle cx="695" cy="268" r="12" fill="rgba(16,185,129,0.5)" stroke="rgba(16,185,129,0.8)" stroke-width="1.5"/>
  <path d="M677,308 Q695,285 713,308" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.6)" stroke-width="1.5"/>

  <!-- Gold accent -->
  <rect x="60" y="60" width="60" height="4" rx="2" fill="#d4a843"/>
  <text x="60" y="52" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#d4a843" letter-spacing="3">RENTAL MANAGEMENT · FLORIDA</text>

  <!-- Main text -->
  <text x="60" y="120" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#ffffff">How to Find</text>
  <text x="60" y="165" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#3b82f6">Quality Tenants</text>
  <text x="60" y="205" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#ffffff">in Florida</text>
  <text x="60" y="240" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Listing · Screening · Leasing · 2026 Guide</text>

  <!-- Stat boxes -->
  <rect x="60" y="268" width="110" height="52" rx="8" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="115" y="289" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="#10b981" text-anchor="middle">7+</text>
  <text x="115" y="306" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="middle">Listing Platforms</text>

  <rect x="182" y="268" width="130" height="52" rx="8" fill="rgba(37,99,235,0.12)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
  <text x="247" y="289" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="#3b82f6" text-anchor="middle">14 Days</text>
  <text x="247" y="306" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="middle">Average Days to Rent</text>

  <!-- Badge -->
  <rect x="60" y="338" width="190" height="36" rx="18" fill="#2563eb"/>
  <text x="155" y="361" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Step-by-Step System</text>
</svg>
