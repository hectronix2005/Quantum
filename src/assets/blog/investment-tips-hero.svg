<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0e1c30"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Background glow under chart -->
  <ellipse cx="600" cy="310" rx="200" ry="50" fill="rgba(16,185,129,0.07)"/>

  <!-- Chart area (right side) -->
  <!-- Grid -->
  <line x1="420" y1="100" x2="420" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="420" y1="310" x2="760" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="420" y1="200" x2="760" y2="200" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="420" y1="150" x2="760" y2="150" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="420" y1="250" x2="760" y2="250" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Y-axis labels -->
  <text x="415" y="104" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">20%</text>
  <text x="415" y="154" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">15%</text>
  <text x="415" y="204" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">10%</text>
  <text x="415" y="254" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">5%</text>

  <!-- ROI trend line (upward) -->
  <polyline points="440,290 490,265 540,240 580,210 620,175 660,145 700,120 740,105"
    fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Area under line -->
  <polygon points="440,290 490,265 540,240 580,210 620,175 660,145 700,120 740,105 740,310 440,310"
    fill="rgba(16,185,129,0.07)"/>

  <!-- Data points -->
  <circle cx="440" cy="290" r="4" fill="#2563eb"/>
  <circle cx="540" cy="240" r="4" fill="#2563eb"/>
  <circle cx="620" cy="175" r="5" fill="#3b82f6"/>
  <circle cx="700" cy="120" r="5" fill="#10b981"/>
  <circle cx="740" cy="105" r="6" fill="#10b981" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

  <!-- Top point label -->
  <text x="750" y="102" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#10b981">18%</text>
  <text x="750" y="114" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">ROI</text>

  <!-- X-axis labels -->
  <text x="440" y="325" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">2020</text>
  <text x="540" y="325" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">2021</text>
  <text x="620" y="325" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">2022</text>
  <text x="700" y="325" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">2024</text>
  <text x="740" y="325" font-family="Arial,sans-serif" font-size="8" fill="rgba(16,185,129,0.7)" text-anchor="middle">2026</text>

