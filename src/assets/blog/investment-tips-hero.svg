  <rect x="450" y="335" width="50" height="35" rx="3" fill="rgba(37,99,235,0.2)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
  <text x="475" y="348" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Miami</text>
  <text x="475" y="362" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">6.2%</text>

  <rect x="510" y="335" width="50" height="35" rx="3" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="535" y="348" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Orlando</text>
  <text x="535" y="362" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#10b981" text-anchor="middle">7.1%</text>

  <rect x="570" y="335" width="50" height="35" rx="3" fill="rgba(212,168,67,0.12)" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  <text x="595" y="348" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Tampa</text>
  <text x="595" y="362" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#d4a843" text-anchor="middle">6.8%</text>

  <rect x="630" y="335" width="65" height="35" rx="3" fill="rgba(37,99,235,0.12)" stroke="rgba(37,99,235,0.25)" stroke-width="1"/>
  <text x="663" y="348" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Jacksonville</text>
  <text x="663" y="362" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">7.5%</text>

  <!-- Gold accent + text (left side) -->
  <rect x="60" y="60" width="60" height="4" rx="2" fill="#d4a843"/>
  <text x="60" y="52" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#d4a843" letter-spacing="3">INVESTMENT GUIDE · FLORIDA 2026</text>

  <text x="60" y="118" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#ffffff">Investment</text>
  <text x="60" y="162" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#10b981">Property Tips</text>
  <text x="60" y="206" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#ffffff">Florida 2026</text>
  <text x="60" y="240" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Cap Rates · ROI · Tax Advantages · Mistakes</text>

  <!-- Key metric boxes -->
  <rect x="60" y="265" width="110" height="52" rx="8" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="115" y="286" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="#10b981" text-anchor="middle">No Tax</text>
  <text x="115" y="302" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="middle">State Income Tax</text>

  <rect x="182" y="265" width="110" height="52" rx="8" fill="rgba(37,99,235,0.12)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
  <text x="237" y="286" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="#3b82f6" text-anchor="middle">1031</text>
  <text x="237" y="302" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="middle">Tax-Deferred Exchange</text>

  <rect x="60" y="338" width="200" height="36" rx="18" fill="#10b981"/>
  <text x="160" y="361" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Maximize Your Florida ROI</text>
</svg>
